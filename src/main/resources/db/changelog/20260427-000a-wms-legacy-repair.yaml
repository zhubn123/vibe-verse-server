databaseChangeLog:
  - changeSet:
      id: 20260427-000a-01-drop-inbound-location-index
      author: berlin
      comment: 兼容早期入库单表头库位索引
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - sqlCheck:
            expectedResult: "1"
            sql: |
              select count(*)
              from information_schema.statistics
              where table_schema = database()
                and table_name = 'inbound_order'
                and index_name = 'idx_inbound_location_id'
      changes:
        - sql:
            sql: alter table inbound_order drop index idx_inbound_location_id;

  - changeSet:
      id: 20260427-000a-02-drop-inbound-location-column
      author: berlin
      comment: 兼容早期入库单表头库位字段
