databaseChangeLog:
  - changeSet:
      id: 20260502-2230-system-dictionary-int-id
      author: codex
      comment: 字典表主键从 bigint 迁移为 int 自增
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - sqlCheck:
            expectedResult: "1"
            sql: |
              select count(*)
              from information_schema.columns
              where table_schema = database()
                and table_name = 'sys_dict_type'
                and column_name = 'id'
                and data_type = 'bigint'
      changes:
        - sql:
            sql: drop table if exists sys_dict_type_tmp;
        - sql:
            sql: drop table if exists sys_dict_item_tmp;
        - sql:
            sql: drop table if exists sys_dict_type_legacy;
        - sql:
            sql: drop table if exists sys_dict_item_legacy;
        - sql:
            sql: |
              create table sys_dict_type_tmp
              (
                  id          int primary key auto_increment comment '主键ID',
                  dict_code   varchar(128) not null comment '字典编码',
                  dict_name   varchar(128) not null comment '字典名称',
                  module      varchar(64)  not null default 'system' comment '所属模块',
                  status      tinyint      not null default 0 comment '状态（0正常 1停用）',
                  remark      varchar(255) not null default '' comment '备注',
                  create_by   varchar(64)  not null default '' comment '创建人',
                  create_time datetime     not null default CURRENT_TIMESTAMP comment '创建时间',
                  update_by   varchar(64)  not null default '' comment '更新人',
                  update_time datetime     not null default CURRENT_TIMESTAMP on update CURRENT_TIMESTAMP comment '更新时间',
                  unique key uk_sys_dict_type_code (dict_code),
                  key idx_sys_dict_type_module (module)
              ) engine = InnoDB comment '系统字典类型表'
                collate = utf8mb4_unicode_ci;
        - sql:
            sql: |
              create table sys_dict_item_tmp
              (
                  id          int primary key auto_increment comment '主键ID',
                  dict_code   varchar(128) not null comment '字典编码',
                  item_value  varchar(128) not null comment '字典项值',
                  item_label  varchar(128) not null comment '字典项标签',
                  sort_order  int          not null default 0 comment '排序号',
                  status      tinyint      not null default 0 comment '状态（0正常 1停用）',
                  remark      varchar(255) not null default '' comment '备注',
                  create_by   varchar(64)  not null default '' comment '创建人',
                  create_time datetime     not null default CURRENT_TIMESTAMP comment '创建时间',
                  update_by   varchar(64)  not null default '' comment '更新人',
                  update_time datetime     not null default CURRENT_TIMESTAMP on update CURRENT_TIMESTAMP comment '更新时间',
                  unique key uk_sys_dict_item_value (dict_code, item_value),
                  key idx_sys_dict_item_code_status_sort (dict_code, status, sort_order)
              ) engine = InnoDB comment '系统字典项表'
                collate = utf8mb4_unicode_ci;
        - sql:
            sql: |
              insert into sys_dict_type_tmp
                  (dict_code, dict_name, module, status, remark, create_by, create_time, update_by, update_time)
              select dict_code, dict_name, module, status, remark, create_by, create_time, update_by, update_time
              from sys_dict_type
              order by dict_code;
        - sql:
            sql: |
              insert into sys_dict_item_tmp
                  (dict_code, item_value, item_label, sort_order, status, remark, create_by, create_time, update_by, update_time)
              select dict_code, item_value, item_label, sort_order, status, remark, create_by, create_time, update_by, update_time
              from sys_dict_item
              order by dict_code, sort_order, id;
        - sql:
            sql: rename table sys_dict_type to sys_dict_type_legacy, sys_dict_type_tmp to sys_dict_type;
        - sql:
            sql: rename table sys_dict_item to sys_dict_item_legacy, sys_dict_item_tmp to sys_dict_item;
        - sql:
            sql: drop table sys_dict_type_legacy;
        - sql:
            sql: drop table sys_dict_item_legacy;
