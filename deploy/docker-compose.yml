name: vibe-verse

services:
  mysql:
    image: mysql:8.4
    container_name: vibe-verse-mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vibe_verse}
      MYSQL_USER: ${DB_USERNAME:-vibe_verse}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - vibe-verse-mysql-data:/var/lib/mysql
    networks:
      - vibe-verse-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  server:
    image: vibe-verse-server:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: vibe-verse-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://vibe-verse-mysql:3306/${MYSQL_DATABASE:-vibe_verse}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
      DB_USERNAME: ${DB_USERNAME:-vibe_verse}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      AUTH_REFRESH_TOKEN_SECRET: ${AUTH_REFRESH_TOKEN_SECRET:?AUTH_REFRESH_TOKEN_SECRET is required}
      OSS_LOCAL_ROOT_PATH: /app/data/oss
      UPLOAD_MAX_FILE_SIZE: ${UPLOAD_MAX_FILE_SIZE:-50MB}
      UPLOAD_MAX_REQUEST_SIZE: ${UPLOAD_MAX_REQUEST_SIZE:-50MB}
      OSS_MAX_FILE_SIZE: ${OSS_MAX_FILE_SIZE:-50MB}
      AUDIT_TRANSPORT: ${AUDIT_TRANSPORT:-async}
      JAVA_OPTS: ${JAVA_OPTS:-}
    volumes:
      - vibe-verse-oss-data:/app/data/oss
    ports:
      - "${SERVER_HOST_PORT:-18081}:8080"
    networks:
      - vibe-verse-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 45s

  web:
    image: vibe-verse-web:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: vibe-verse-web
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${WEB_HOST_PORT:-18080}:80"
    networks:
      - vibe-verse-net

networks:
  vibe-verse-net:
    name: vibe-verse-net

volumes:
  vibe-verse-mysql-data:
    name: vibe-verse-mysql-data
  vibe-verse-oss-data:
    name: vibe-verse-oss-data
